<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KRATOS 2026 Offline</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #fffcf0;
        color: #1a1c1c;
      }

      .shell {
        max-width: 720px;
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        border: 3px solid #1a1c1c;
        background: #fff9d6;
        box-shadow: 8px 8px 0 0 #ffd100;
        padding: 32px;
      }

      .eyebrow {
        display: inline-block;
        background: #ffd100;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: 40px;
        line-height: 0.95;
        text-transform: uppercase;
      }

      p {
        margin: 0 0 14px;
        font-weight: 700;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <span class="eyebrow">Offline Fallback</span>
        <h1>KRATOS 2026</h1>
        <p>The network is unstable right now, but the platform shell is still available.</p>
        <p>Reconnect to load the latest registrations, schedules, and admin actions.</p>
      </section>
    </main>
  </body>
  </html>
